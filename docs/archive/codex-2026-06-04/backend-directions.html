<style>
  .direction-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
    margin-top: 20px;
  }
  .direction-card {
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    background: #ffffff;
    overflow: hidden;
    cursor: pointer;
    transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
  }
  .direction-card:hover {
    transform: translateY(-2px);
    border-color: #2563eb;
    box-shadow: 0 14px 34px rgba(15, 23, 42, .12);
  }
  .mini-ui {
    height: 310px;
    background: #f8fafc;
    display: grid;
    grid-template-columns: 68px 1fr;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    color: #0f172a;
  }
  .mini-side {
    background: #111827;
    padding: 14px 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .mini-logo {
    width: 32px;
    height: 32px;
    border-radius: 9px;
    background: #f97316;
    margin: 0 auto 8px;
  }
  .mini-icon {
    height: 24px;
    border-radius: 7px;
    background: rgba(255,255,255,.18);
  }
  .mini-icon.active {
    background: #f97316;
  }
  .mini-main {
    padding: 16px;
    overflow: hidden;
  }
  .mini-top {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }
  .mini-title {
    width: 120px;
    height: 17px;
    border-radius: 99px;
    background: #0f172a;
  }
  .mini-chip {
    width: 66px;
    height: 20px;
    border-radius: 99px;
    background: #dcfce7;
  }
  .metric-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .metric {
    height: 62px;
    border-radius: 10px;
    background: #ffffff;
    border: 1px solid #e5e7eb;
    padding: 10px;
  }
  .metric::before {
    content: "";
    display: block;
    width: 54%;
    height: 8px;
    border-radius: 99px;
    background: #94a3b8;
    margin-bottom: 12px;
  }
  .metric::after {
    content: "";
    display: block;
    width: 75%;
    height: 14px;
    border-radius: 99px;
    background: #0f172a;
  }
  .panel {
    border-radius: 10px;
    background: #ffffff;
    border: 1px solid #e5e7eb;
    padding: 10px;
  }
  .line {
    height: 10px;
    border-radius: 99px;
    background: #cbd5e1;
    margin-bottom: 9px;
  }
  .line.dark {
    background: #334155;
  }
  .split-panels {
    display: grid;
    grid-template-columns: 1.2fr .8fr;
    gap: 9px;
  }
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 9px;
  }
  .dish {
    height: 68px;
    border-radius: 10px;
    background: #fff7ed;
    border: 1px solid #fed7aa;
    padding: 9px;
  }
  .dish:nth-child(2) { background: #f0fdf4; border-color: #bbf7d0; }
  .dish:nth-child(3) { background: #eff6ff; border-color: #bfdbfe; }
  .dish:nth-child(4) { background: #fef2f2; border-color: #fecaca; opacity: .65; }
  .dish::before {
    content: "";
    display: block;
    height: 9px;
    width: 76%;
    border-radius: 99px;
    background: #334155;
    margin-bottom: 18px;
  }
  .dish::after {
    content: "";
    display: block;
    height: 8px;
    width: 42%;
    border-radius: 99px;
    background: #f97316;
  }
  .workflow {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }
  .task {
    height: 42px;
    border-radius: 10px;
    background: #ffffff;
    border: 1px solid #e5e7eb;
    display: grid;
    grid-template-columns: 34px 1fr 46px;
    gap: 8px;
    padding: 8px;
    align-items: center;
  }
  .dot {
    height: 22px;
    width: 22px;
    border-radius: 999px;
    background: #f97316;
  }
  .pill {
    height: 16px;
    border-radius: 99px;
    background: #e2e8f0;
  }
  .pill.green { background: #bbf7d0; }
  .card-body {
    padding: 16px;
  }
  .card-body h3 {
    margin: 0 0 8px;
  }
  .card-body p {
    margin: 0;
    color: #475569;
    line-height: 1.55;
  }
  @media (max-width: 980px) {
    .direction-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
